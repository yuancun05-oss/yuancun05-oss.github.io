<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>「Echo」</title>

  <style>
    html, body{
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: sans-serif;
    }

    body{
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
      box-sizing: border-box;
    }

    h1{
      font-size: 32px;
      margin-top: 0;
    }

    textarea{
      width: 100%;
      min-height: 120px;
      background: #111;
      color: white;
      border: 1px solid white;
      padding: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    #signal{
      min-height: 120px;
    }

    button{
      padding: 10px 12px;
      margin: 4px 4px 4px 0;
      cursor: pointer;
      font-size: 14px;
      background: #111;
      color: white;
      border: 1px solid white;
    }

    #chat{
      border: 1px solid #ffffff;
      padding: 16px;
      height: 640px;
      overflow: auto;
      margin-top: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
      word-break: break-word;
      background: #050505;
    }

    .msg{
      margin: 8px 0;
      padding: 8px 10px;
      border: 1px solid #333;
      background: #111;
    }

    .msg img{
      border: 1px solid #444;
    }

    .chat-preview{
      display: block;
      max-width: 180px;
      max-height: 180px;
      width: auto;
      height: auto;
      margin-top: 8px;
      object-fit: contain;
      cursor: pointer;
    }

    .preview-actions{
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .preview-actions button{
      padding: 6px 10px;
      font-size: 13px;
      margin: 0;
    }

    .composer{
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-top: 8px;
    }

    .composer-main{
      flex: 1;
    }

    #msg{
      width: 100%;
      min-height: 48px;
      max-height: 220px;
      resize: none;
      overflow-y: hidden;
      line-height: 1.5;
      margin: 0;
    }

    .composer-side{
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 120px;
      flex-shrink: 0;
    }

    .composer-side button{
      width: 100%;
      margin: 0;
    }

    #fileInput{
      display: none;
    }

    a{
      color: #7db7ff;
    }

    @media (max-width: 600px){
      body{
        padding: 12px;
      }

      h1{
        font-size: 24px;
      }

      button{
        width: 100%;
        margin: 6px 0;
      }

      .preview-actions{
        flex-direction: column;
        align-items: stretch;
      }

      .preview-actions button{
        width: 100%;
      }

      #chat{
        height: 520px;
        padding: 12px;
      }

      .chat-preview{
        max-width: 140px;
        max-height: 140px;
      }

      .composer{
        flex-direction: column;
        align-items: stretch;
      }

      .composer-side{
        width: 100%;
      }

      .composer-side button{
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <h1>P2P 回音</h1>

  <div>Connection: <span id="status">new</span></div>
  <div>连接状态 ----- ↑</div>

  <textarea id="signal"></textarea>

  <br><br>

  <button onclick="createOffer()">1 创建</button>
  <button onclick="copySignal()">复制密钥</button>
  <button onclick="pasteSignal()">粘贴密钥</button>
  <button onclick="clearSignal()">删除密钥文本</button>
  <button onclick="acceptOffer()">2 接受并给予回应</button>
  <button onclick="acceptAnswer()">3 接受回应</button>

  <hr>

  <div id="chat"></div>

  <div class="composer">
    <div class="composer-main">
      <textarea id="msg" placeholder="输入消息..."></textarea>
    </div>

    <div class="composer-side">
      <input id="fileInput" type="file">
      <button onclick="pickFile()">发送文件</button>
      <button onclick="sendMsg()">发送消息</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const signalBox = document.getElementById("signal");
    const chat = document.getElementById("chat");
    const fileInput = document.getElementById("fileInput");
    const msgInput = document.getElementById("msg");

    let channel;

    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    let incomingFileInfo = null;
    let incomingFileBuffers = [];
    let incomingReceivedSize = 0;

    const CHUNK_SIZE = 16 * 1024;

    pc.onconnectionstatechange = () => {
      statusEl.textContent = pc.connectionState;
    };

    pc.ondatachannel = e => {
      channel = e.channel;
      setupChannel();
    };

    function addChatMessage(html){
      chat.innerHTML += `<div class="msg">${html}</div>`;
      chat.scrollTop = chat.scrollHeight;
    }

    function setupChannel(){
      channel.binaryType = "arraybuffer";

      channel.onopen = () => {
        addChatMessage("🔗 connected");
      };

      channel.onmessage = async (e) => {
        if (typeof e.data === "string") {
          try {
            const data = JSON.parse(e.data);

            if (data.type === "text") {
              addChatMessage("<b>Peer:</b> " + escapeHtml(data.text).replace(/\n/g, "<br>"));
              return;
            }

            if (data.type === "file-meta") {
              incomingFileInfo = data;
              incomingFileBuffers = [];
              incomingReceivedSize = 0;

              addChatMessage(
                `<b>Peer 正在发送文件:</b> ${escapeHtml(data.name)} (${formatBytes(data.size)})`
              );
              return;
            }
          } catch {
            addChatMessage("<b>Peer:</b> " + escapeHtml(e.data));
            return;
          }
        }

        if (e.data instanceof ArrayBuffer) {
          incomingFileBuffers.push(e.data);
          incomingReceivedSize += e.data.byteLength;

          if (incomingFileInfo && incomingReceivedSize >= incomingFileInfo.size) {
            const blob = new Blob(incomingFileBuffers, { type: incomingFileInfo.mime });
            const url = URL.createObjectURL(blob);

            if (incomingFileInfo.mime.startsWith("image/")) {
              addChatMessage(`
                <b>收到图片:</b> ${escapeHtml(incomingFileInfo.name)}<br>
                <img
                  class="chat-preview"
                  src="${url}"
                  alt="${escapeHtml(incomingFileInfo.name)}"
                  onclick="openImagePreview('${url}', '${escapeJs(incomingFileInfo.name)}')"
                >
                <div class="preview-actions">
                  <button onclick="openImagePreview('${url}', '${escapeJs(incomingFileInfo.name)}')">查看大图</button>
                  <a href="${url}" download="${escapeHtml(incomingFileInfo.name)}">下载图片</a>
                </div>
              `);
            } else {
              addChatMessage(`
                <b>收到文件:</b> ${escapeHtml(incomingFileInfo.name)} (${formatBytes(incomingFileInfo.size)})<br>
                <a href="${url}" download="${escapeHtml(incomingFileInfo.name)}">下载文件</a>
              `);
            }

            incomingFileInfo = null;
            incomingFileBuffers = [];
            incomingReceivedSize = 0;
          }
        }
      };
    }

    function encode(obj){
      return btoa(JSON.stringify(obj));
    }

    function decode(str){
      return JSON.parse(atob(str));
    }

    async function waitIce(){
      if(pc.iceGatheringState === "complete") return;

      await new Promise(resolve => {
        pc.onicegatheringstatechange = () => {
          if(pc.iceGatheringState === "complete") resolve();
        };
      });
    }

    async function createOffer(){
      channel = pc.createDataChannel("chat");
      setupChannel();

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      await waitIce();

      signalBox.value = encode(pc.localDescription);
    }

    async function acceptOffer(){
      const text = signalBox.value.trim();
      if(!text){
        alert("没有可用的密钥文本");
        return;
      }

      const offer = decode(text);
      await pc.setRemoteDescription(offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await waitIce();

      signalBox.value = encode(pc.localDescription);
    }

    async function acceptAnswer(){
      const text = signalBox.value.trim();
      if(!text){
        alert("没有可用的密钥文本");
        return;
      }

      const answer = decode(text);
      await pc.setRemoteDescription(answer);
    }

    function sendMsg(){
      const text = msgInput.value.trim();

      if(!text) return;

      if(channel && channel.readyState === "open"){
        channel.send(JSON.stringify({
          type: "text",
          text: text
        }));

        addChatMessage("<b>Me:</b> " + escapeHtml(text).replace(/\n/g, "<br>"));
        msgInput.value = "";
        autoResizeMessageBox();
      } else {
        alert("连接还没有建立");
      }
    }

    function pickFile(){
      fileInput.click();
    }

    async function sendFile(){
      if(!(channel && channel.readyState === "open")){
        alert("连接还没有建立");
        return;
      }

      const file = fileInput.files[0];
      if(!file){
        return;
      }

      addChatMessage(
        `<b>Me 正在发送文件:</b> ${escapeHtml(file.name)} (${formatBytes(file.size)})`
      );

      channel.send(JSON.stringify({
        type: "file-meta",
        name: file.name,
        size: file.size,
        mime: file.type || "application/octet-stream"
      }));

      let offset = 0;

      while(offset < file.size){
        const slice = file.slice(offset, offset + CHUNK_SIZE);
        const buffer = await slice.arrayBuffer();

        while(channel.bufferedAmount > CHUNK_SIZE * 16){
          await sleep(20);
        }

        channel.send(buffer);
        offset += buffer.byteLength;
      }

      if(file.type.startsWith("image/")){
        const localUrl = URL.createObjectURL(file);
        addChatMessage(`
          <b>已发送图片:</b> ${escapeHtml(file.name)}<br>
          <img
            class="chat-preview"
            src="${localUrl}"
            alt="${escapeHtml(file.name)}"
            onclick="openImagePreview('${localUrl}', '${escapeJs(file.name)}')"
          >
          <div class="preview-actions">
            <button onclick="openImagePreview('${localUrl}', '${escapeJs(file.name)}')">查看大图</button>
          </div>
        `);
      } else {
        addChatMessage(`
          <b>已发送文件:</b> ${escapeHtml(file.name)} (${formatBytes(file.size)})
        `);
      }

      fileInput.value = "";
    }

    async function copySignal(){
      const text = signalBox.value.trim();

      if(!text){
        alert("没有可复制的密钥");
        return;
      }

      try{
        await navigator.clipboard.writeText(text);
        alert("密钥已复制");
      }catch(err){
        signalBox.select();
        document.execCommand("copy");
        alert("密钥已复制");
      }
    }

    async function pasteSignal(){
      try{
        const text = await navigator.clipboard.readText();

        if(!text){
          alert("剪贴板里没有可粘贴的内容");
          return;
        }

        signalBox.value = text;
        alert("密钥已粘贴");
      }catch(err){
        alert("无法读取剪贴板，请检查浏览器权限");
      }
    }

    function clearSignal(){
      signalBox.value = "";
      alert("密钥文本已删除");
    }

    function openImagePreview(url, fileName){
      const win = window.open("", "_blank");

      if(!win){
        alert("浏览器拦截了新窗口，请允许弹出窗口");
        return;
      }

      win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>${escapeHtml(fileName || "图片预览")}</title>
          <style>
            html, body{
              margin: 0;
              padding: 0;
              background: black;
              width: 100%;
              height: 100%;
              overflow: auto;
            }

            .viewer{
              min-height: 100vh;
              display: flex;
              justify-content: center;
              align-items: center;
              padding: 12px;
              box-sizing: border-box;
            }

            img{
              max-width: 100%;
              max-height: 100vh;
              width: auto;
              height: auto;
              object-fit: contain;
              display: block;
            }
          </style>
        </head>
        <body>
          <div class="viewer">
            <img src="${url}" alt="${escapeHtml(fileName || "图片")}">
          </div>
        </body>
        </html>
      `);

      win.document.close();
    }

    function autoResizeMessageBox(){
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 220) + "px";
      msgInput.style.overflowY = msgInput.scrollHeight > 220 ? "auto" : "hidden";
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function formatBytes(bytes){
      if(bytes < 1024) return bytes + " B";
      if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(2) + " MB";
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(str){
      return String(str)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "\\r");
    }

    msgInput.addEventListener("input", autoResizeMessageBox);

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMsg();
      }
    });

    fileInput.addEventListener("change", sendFile);

    autoResizeMessageBox();
  </script>

</body>
</html>
